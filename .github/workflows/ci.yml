name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  backend-test:
    name: Backend — Lint, Type Check, Test
    runs-on: ubuntu-latest

    services:
      timescaledb:
        image: timescale/timescaledb:latest-pg15
        env:
          POSTGRES_USER: sst_user
          POSTGRES_PASSWORD: sst_test_password
          POSTGRES_DB: sst_test_db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports: ["5432:5432"]

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
        ports: ["6379:6379"]

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint with ruff
        run: ruff check src/ tests/

      - name: Check formatting with black
        run: black --check src/ tests/

      - name: Type check with mypy
        run: mypy src/

      - name: Security scan with bandit
        run: bandit -r src/ -c pyproject.toml

      - name: Run tests with coverage
        env:
          DATABASE_URL: postgresql+asyncpg://sst_user:sst_test_password@localhost:5432/sst_test_db
          DATABASE_URL_SYNC: postgresql://sst_user:sst_test_password@localhost:5432/sst_test_db
          REDIS_URL: redis://localhost:6379/0
          SECRET_KEY: test-secret-key-minimum-32-characters-long
          ALPHA_VANTAGE_API_KEY: test-key
          NEWS_API_KEY: test-key
          FINNHUB_API_KEY: test-key
          REDDIT_CLIENT_ID: test-id
          REDDIT_CLIENT_SECRET: test-secret
          CELERY_BROKER_URL: redis://localhost:6379/1
          CELERY_RESULT_BACKEND: redis://localhost:6379/2
        run: pytest --cov=src --cov-report=term-missing --cov-fail-under=85

  frontend-test:
    name: Frontend — Lint, TypeCheck, Build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint with ESLint
        run: npm run lint

      - name: Type check with TypeScript
        run: npm run typecheck

      - name: Check formatting with Prettier
        run: npm run format:check

      - name: Security audit
        run: npm audit --audit-level=high

      - name: Build production bundle
        run: npm run build
