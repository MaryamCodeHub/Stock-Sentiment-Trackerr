version: "3.9"

services:
  db:
    image: timescale/timescaledb:latest-pg15
    ports: ["5432:5432"]
    environment:
      POSTGRES_USER: sst_user
      POSTGRES_PASSWORD: sst_password
      POSTGRES_DB: sst_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/scripts/init_db.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sst_user -d sst_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    volumes:
      - redis_data:/data
      - ./configs/redis.conf:/etc/redis/redis.conf
    command: redis-server /etc/redis/redis.conf
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s

  api:
    build: ./backend
    ports: ["8000:8000"]
    env_file: ./backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://sst_user:sst_password@db:5432/sst_db
      DATABASE_URL_SYNC: postgresql://sst_user:sst_password@db:5432/sst_db
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    volumes:
      - ./backend/src:/app/src
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uvicorn src.api.main:app --host 0.0.0.0 --port 8000 --reload

  worker:
    build: ./backend
    env_file: ./backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://sst_user:sst_password@db:5432/sst_db
      DATABASE_URL_SYNC: postgresql://sst_user:sst_password@db:5432/sst_db
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    volumes:
      - ./backend/src:/app/src
    depends_on:
      - api
    command: celery -A src.tasks.celery_app worker --loglevel=info

  frontend:
    build: ./frontend
    ports: ["3000:80"]
    depends_on:
      - api

volumes:
  postgres_data:
  redis_data:
